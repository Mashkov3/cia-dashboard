<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء حساب</title>
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/auth.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-card glass">
        <h1 class="auth-title">إنشاء حساب</h1>
        <div class="auth-tabs">
          <a class="auth-tab" href="index.html">تسجيل الدخول</a>
          <a class="auth-tab active" href="register.html">إنشاء حساب</a>
        </div>

        <form id="register-form" class="auth-form">
          <input class="input" type="text" name="username" placeholder="agent name" />
          <input class="input" type="password" name="password" placeholder="agent code pass" />
          <div id="register-error" class="error-box"></div>
          <button class="btn" type="submit">إنشاء الحساب</button>
        </form>

        <div class="auth-note">
          لديك حساب بالفعل؟
          <a href="index.html">تسجيل الدخول</a>
        </div>
      </section>
    </main>
    <script type="module" src="assets/js/auth.js"></script>
  </body>
</html>
