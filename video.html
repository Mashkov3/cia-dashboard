<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>قسم الفيديو</title>
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
  </head>
  <body class="app-shell" data-tab-id="video">
    <header class="topbar glass" data-editable="true" data-edit-id="topbar">
      <div class="topbar-right">
        <span class="user-name" data-username>Agent</span>
        <div class="logo-slot" data-image-target="logo" aria-label="CIA logo placeholder"></div>
      </div>
      <div class="topbar-center">
        <div class="page-title" data-page-title>قسم الفيديو</div>
      </div>
      <div class="topbar-left">
        <button class="icon-btn" data-action="lang">
          <span class="icon-slot" data-icon="lang"></span>
          <span>AR/EN</span>
        </button>
        <a class="icon-btn" href="app.html">
          <span class="icon-slot" data-icon="home"></span>
          <span>Home</span>
        </a>
        <button class="icon-btn" data-action="settings">
          <span class="icon-slot" data-icon="settings"></span>
          <span>الإعدادات</span>
        </button>
      </div>
    </header>

    <main class="page">
      <section class="section-layout" data-editable="true" data-edit-id="section-layout">
        <div class="section-header" data-section-title>قسم الفيديو</div>
        <div class="center-tabs" data-section-tabs></div>
        <section class="tab-content" data-editable="true" data-edit-id="tab-content" data-section-content></section>
      </section>
    </main>

    <div class="hud-container" data-hud-container></div>

    <aside class="admin-panel glass" data-admin-panel>
      <h3>لوحة المالك / الأدمن</h3>
      <div class="admin-group">
        <div class="admin-toggle">
          <label for="edit-toggle">وضع التعديل</label>
          <input id="edit-toggle" type="checkbox" />
        </div>
      </div>
      <div class="admin-group">
        <label for="accent-color">لون أساسي</label>
        <input id="accent-color" type="color" value="#d7b76a" />
        <label for="accent-soft-color">لون ثانوي</label>
        <input id="accent-soft-color" type="color" value="#6ec7b3" />
      </div>
      <div class="admin-group">
        <label for="font-select">الخط الرئيسي</label>
        <select id="font-select">
          <option value="Oxanium">Oxanium</option>
          <option value="Rajdhani">Rajdhani</option>
          <option value="Cinzel">Cinzel</option>
        </select>
      </div>
      <div class="admin-group">
        <label for="image-target">رفع صورة</label>
        <select id="image-target">
          <option value="logo">شعار الهيدر</option>
          <option value="tickerLogo">شعار الشريط</option>
        </select>
        <input id="image-file" type="file" accept="image/*" />
        <button id="image-apply" class="btn" type="button">تطبيق الصورة</button>
      </div>
      <div class="admin-group">
        <label for="hud-title">عنوان HUD</label>
        <input id="hud-title" type="text" placeholder="عنوان اللوحة" />
        <label for="hud-content">وصف HUD</label>
        <input id="hud-content" type="text" placeholder="نص اللوحة" />
        <button id="hud-add" class="btn" type="button">إضافة HUD Panel</button>
      </div>
    </aside>

    <aside class="settings-panel glass" data-settings-panel>
      <div class="section-label">الإعدادات</div>
      <button class="btn" type="button" data-action="logout">تسجيل الخروج</button>
    </aside>

    <footer class="ticker-bar glass" data-editable="true" data-edit-id="ticker">
      <div class="ticker-fixed">
        <div class="logo-slot" data-image-target="tickerLogo" aria-label="CIA ticker logo"></div>
        <div>خبر عاجل</div>
      </div>
      <div class="ticker-track">
        <div class="ticker-text" data-ticker-text></div>
      </div>
    </footer>

    <script type="module" src="assets/js/section.js"></script>
    <script type="module" src="assets/js/ticker.js"></script>
    <script type="module" src="assets/js/ui-admin.js"></script>
  </body>
</html>
